name: Bug report
description: Report a reproducible defect.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Clear description of the issue.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact commands/config to reproduce.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior / Logs
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS + Python version + git SHA/tag
      placeholder: macOS 15, Python 3.12.4, commit abc123
