name: Weekly Security Scans

on:
  schedule:
    - cron: "13 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security_scan:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit bandit

      - name: Run pip-audit
        continue-on-error: true
        run: pip-audit --progress-spinner off --desc --format json --output pip-audit.json

      - name: Run bandit
        continue-on-error: true
        run: bandit -r src -f json -o bandit.json

      - name: Install web dependencies
        continue-on-error: true
        run: npm --prefix apps/web ci

      - name: Run npm audit (web runtime deps)
        continue-on-error: true
        run: npm --prefix apps/web audit --omit=dev --json > npm-audit-web.json

      - name: Upload security artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-reports
          path: |
            pip-audit.json
            bandit.json
            npm-audit-web.json
