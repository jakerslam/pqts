name: Native Hotpath Wheels

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - "native/hotpath/**"
      - ".github/workflows/native-hotpath.yml"

permissions:
  contents: read

jobs:
  build_wheels:
    name: Build native wheels (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheels with maturin
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --manifest-path native/hotpath/Cargo.toml --interpreter python${{ matrix.python-version }}

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v7
        with:
          name: hotpath-wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: target/wheels/*.whl
