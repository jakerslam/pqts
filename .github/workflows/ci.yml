# GitHub Actions CI for PQTS
# Tests: pytest, lint, security, type-check
name: PQTS CI

on:
  push:
    branches: [ main, develop, prod ]
  pull_request:
    branches: [ main, prod ]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
      fail-fast: false

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Run kill switch tests
      run: pytest tests/test_kill_switches.py -v --tb=short -x

    - name: Run backtesting tests
      run: pytest tests/test_backtesting.py -v --tb=short -x

    - name: Run all tests
      run: pytest tests/ -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: pip

    - name: Install tools
      run: pip install flake8 black isort

    - name: Check black formatting
      run: black --check --diff . || true

    - name: Check import ordering
      run: isort --check --diff . || true

    - name: Run flake8
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: pip

    - name: Install bandit
      run: pip install bandit[sarif]

    - name: Run security scan
      run: bandit -r . -f sarif -o bandit-report.sarif || true
