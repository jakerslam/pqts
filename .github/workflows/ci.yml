name: PQTS CI

on:
  push:
    branches:
      - main
      - prod
  pull_request:
    branches:
      - main
      - prod
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify_workflow_raw:
    name: Verify CI YAML on GitHub Raw
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify raw workflow structure
        run: |
          python3 tools/verify_ci_raw.py \
            --sha "${GITHUB_SHA}" \
            --repo "${GITHUB_REPOSITORY}"

  test:
    name: Pytest
    needs: verify_workflow_raw
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run pytest (gating)
        run: pytest tests -q

  lint:
    name: Lint
    needs: verify_workflow_raw
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort

      - name: Black format check (non-gating)
        continue-on-error: true
        run: black --check .

      - name: Isort import check (non-gating)
        continue-on-error: true
        run: isort --check-only .

      - name: Flake8 hard errors (gating)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  static_analysis:
    name: Bandit and Mypy (non-gating)
    needs: verify_workflow_raw
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install analysis tools
        run: |
          python -m pip install --upgrade pip
          pip install mypy bandit

      - name: Run bandit (non-gating)
        continue-on-error: true
        run: bandit -r execution risk core backtesting strategies

      - name: Run mypy (non-gating)
        continue-on-error: true
        run: mypy execution risk core --ignore-missing-imports
