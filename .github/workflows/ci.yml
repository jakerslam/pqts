name: PQTS CI

on:
  push:
    branches:
      - main
      - prod
  pull_request:
    branches:
      - main
      - prod
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr_description_contract:
    name: PR Description Contract
    runs-on: ubuntu-latest
    steps:
      - name: Validate tests checkbox and Ref coverage in PR body
        run: |
          python3 - <<'PYEOF'
          import json
          import os
          import re
          import sys

          event_name = os.getenv("GITHUB_EVENT_NAME", "")
          if event_name != "pull_request":
              print("Not a pull_request event; skipping PR body contract check.")
              sys.exit(0)

          event_path = os.getenv("GITHUB_EVENT_PATH", "")
          if not event_path:
              raise SystemExit("GITHUB_EVENT_PATH not set")

          with open(event_path, "r", encoding="utf-8") as handle:
              payload = json.load(handle)
          body = str(payload.get("pull_request", {}).get("body") or "")

          missing = []
          if not re.search(r"(?mi)^##\\s*Ref Coverage\\s*$", body):
              missing.append("missing '## Ref Coverage' section")
          if not re.search(r"(?mi)Ref:\\s*[A-Z]+-\\d+", body):
              missing.append("missing explicit Ref IDs (e.g., Ref: PMKT-7)")
          if not re.search(
              r"(?mi)^-\\s*\\[[xX]\\]\\s*Tests added/updated for behavior changes\\s*$",
              body,
          ):
              missing.append("tests checkbox must be checked")

          if missing:
              raise SystemExit("PR description contract failed: " + "; ".join(missing))

          print("PR description contract passed.")
          PYEOF

  verify_workflow_raw:
    name: Verify CI YAML on GitHub Raw
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify raw workflow structure
        run: |
          python3 tools/verify_ci_raw.py \
            --sha "${GITHUB_SHA}" \
            --repo "${GITHUB_REPOSITORY}"

  verify_dependency_lock:
    name: Verify Dependency Lock
    needs: verify_workflow_raw
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify lock file structure
        run: python3 tools/verify_dependency_lock.py

  test:
    name: Pytest
    needs: [pr_description_contract, verify_workflow_raw, verify_dependency_lock]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest (gating)
        run: pytest tests -q

  lint:
    name: Lint
    needs: [pr_description_contract, verify_workflow_raw, verify_dependency_lock]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint (gating)
        run: ruff check src/core src/execution src/risk src/analytics src/markets --select E9,F63,F7,F82

      - name: Architecture boundary validation (gating)
        run: python3 tools/check_architecture_boundaries.py

      - name: Stack direction validation (gating)
        run: python3 tools/check_stack_direction.py

      - name: Truth-surface consistency checks (gating)
        run: python3 tools/check_truth_surface.py

      - name: Release instruction example checks (gating)
        run: |
          python3 tools/check_release_examples.py \
            --pyproject pyproject.toml \
            --files README.md docs/RELEASE_CHECKLIST.md docs/QUICKSTART_5_MIN.md

      - name: Top-100 ROI ranking freshness checks (gating)
        run: |
          python3 tools/generate_top_roi_moves.py \
            --todo docs/TODO.md \
            --top 100 \
            --md-out docs/TOP_100_ROI_MOVES.md \
            --json-out docs/TOP_100_ROI_MOVES.json
          git diff --exit-code docs/TOP_100_ROI_MOVES.md docs/TOP_100_ROI_MOVES.json

      - name: Full SRS family-closure checks (gating)
        run: |
          python3 tools/generate_full_srs_closure_artifacts.py \
            --todo docs/TODO.md \
            --defaults-out config/strategy/assimilation_full_closure_defaults.json \
            --map-out docs/SRS_FULL_CLOSURE_EXECUTION_MAP.md
          python3 tools/check_full_srs_closure.py \
            --defaults config/strategy/assimilation_full_closure_defaults.json \
            --todo docs/TODO.md \
            --map docs/SRS_FULL_CLOSURE_EXECUTION_MAP.md \
            --srs docs/SRS.md
          git diff --exit-code \
            config/strategy/assimilation_full_closure_defaults.json \
            docs/SRS_FULL_CLOSURE_EXECUTION_MAP.md

      - name: Studio UX + template contract validation (gating)
        run: python3 tools/check_studio_contract.py

      - name: Core professional contract validation (gating)
        run: python3 tools/check_core_professional_contract.py

      - name: Web API contract validation (gating)
        run: python3 tools/check_web_api_contracts.py

      - name: Surface contract and migration gate validation (gating)
        run: python3 tools/check_surface_contracts.py

      - name: Wedge-first scope governance validation (gating)
        run: python3 tools/check_scope_governance.py --requested-markets crypto

      - name: Native release-matrix metadata validation (gating)
        run: python3 tools/generate_native_release_matrix.py --check

      - name: Native hot-path contract validation (gating)
        run: python3 tools/check_native_hotpath.py

      - name: Tier safety policy validation (gating)
        run: python3 tools/check_tier_safety_policy.py

      - name: Public docs and metadata URL checks (gating)
        run: |
          python3 tools/check_public_links.py \
            --pyproject pyproject.toml \
            --required docs/required_public_links.txt \
            --timeout 12

      - name: Official integration index freshness checks (gating)
        run: |
          python3 tools/check_official_integrations.py \
            --index config/integrations/official_integrations.json \
            --max-age-days 45

      - name: Integration claim parity checks (gating)
        run: |
          python3 tools/check_integration_claim_parity.py \
            --readme README.md \
            --index config/integrations/official_integrations.json

      - name: Certified-paper integration report (gating)
        run: |
          python3 scripts/run_exchange_certification.py \
            --venues binance,coinbase,alpaca,oanda \
            --output data/reports/certifications/latest.json

      - name: Certified-paper integration checks (gating)
        run: |
          python3 tools/check_certified_paper_integrations.py \
            --index config/integrations/official_integrations.json \
            --cert-report data/reports/certifications/latest.json

      - name: Native latency regression checks (gating)
        run: |
          python3 tools/check_native_latency_regression.py \
            --results-dir results/native_benchmarks \
            --policy config/native/latency_policy.json

      - name: Benchmark bundle governance checks (gating)
        run: |
          python3 tools/check_result_bundle_governance.py \
            --results-dir results \
            --index-out data/reports/reference_packs/index.json \
            --diff-out data/reports/reference_packs/diff.json \
            --min-reference-packs 3 \
            --validate-only

      - name: Benchmark program coverage checks (gating)
        run: |
          python3 tools/check_benchmark_program.py \
            --reference-performance results/reference_performance_latest.json \
            --results-root . \
            --policy config/benchmarks/program_policy.json \
            --report-out data/reports/benchmark_program/latest.json

      - name: Claim evidence checks (gating)
        run: python3 tools/check_claim_evidence.py

      - name: Claim evidence link checks (gating)
        run: |
          python3 tools/check_claim_evidence_links.py \
            --target README.md \
            --target docs/BENCHMARKS.md \
            --target docs/REFERENCE_PERFORMANCE.md

      - name: External validation evidence checks (gating)
        run: |
          python3 tools/check_external_validation_evidence.py \
            --user-research docs/USER_RESEARCH_2026_03.md \
            --readme README.md

      - name: External beta cohort framework checks (gating)
        run: |
          python3 tools/check_external_beta_framework.py \
            --registry data/validation/external_beta/cohort_registry.json \
            --user-research docs/USER_RESEARCH_2026_03.md

      - name: Source reliability checks (gating)
        run: python3 tools/check_source_reliability.py

      - name: Roadmap governance checks (gating)
        run: python3 tools/check_roadmap_governance.py

      - name: Wallet-mode example smoke checks (gating)
        run: |
          python3 examples/wallet_modes/run_example.py --mode eoa --dry-run --output json
          python3 examples/wallet_modes/run_example.py --mode proxy --dry-run --output json
          python3 examples/wallet_modes/run_example.py --mode safe --dry-run --output json

  web:
    name: Web (typecheck + vitest)
    needs: [pr_description_contract, verify_workflow_raw, verify_dependency_lock]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Typecheck web app
        run: npm run typecheck

      - name: Run vitest
        run: npm test

      - name: Runtime dependency audit
        run: npm run audit:runtime

  static_analysis:
    name: Bandit and Mypy (non-gating)
    needs: [pr_description_contract, verify_workflow_raw, verify_dependency_lock]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install analysis tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bandit (non-gating)
        continue-on-error: true
        run: bandit -r src/execution src/risk src/core src/backtesting src/strategies

      - name: Run mypy baseline (non-gating)
        continue-on-error: true
        run: mypy src/execution src/risk src/core --ignore-missing-imports

      - name: Run mypy strict phase modules (non-gating)
        continue-on-error: true
        run: mypy src/analytics/paper_readiness.py src/execution/paper_campaign.py src/execution/paper_fill_model.py src/execution/tca_feedback.py

  ci_summary:
    name: CI Summary Artifact
    if: always()
    needs: [pr_description_contract, verify_workflow_raw, verify_dependency_lock, test, lint, static_analysis, web]
    runs-on: ubuntu-latest
    steps:
      - name: Build summary matrix
        run: |
          cat > ci-summary.md <<EOF
          # PQTS CI Matrix

          | Job | Result |
          |-----|--------|
          | pr_description_contract | ${{ needs.pr_description_contract.result }} |
          | verify_workflow_raw | ${{ needs.verify_workflow_raw.result }} |
          | verify_dependency_lock | ${{ needs.verify_dependency_lock.result }} |
          | test | ${{ needs.test.result }} |
          | lint | ${{ needs.lint.result }} |
          | static_analysis | ${{ needs.static_analysis.result }} |
          | web | ${{ needs.web.result }} |
          EOF

      - name: Upload summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-summary
          path: ci-summary.md

      - name: Add summary to workflow UI
        run: cat ci-summary.md >> "$GITHUB_STEP_SUMMARY"
