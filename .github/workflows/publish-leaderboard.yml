name: Publish Docs Site

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "data/reports/simulation_leaderboard_*.csv"
      - "scripts/export_simulation_leaderboard_site.py"
      - ".github/workflows/publish-leaderboard.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pages_ready: ${{ steps.configure_pages.outcome == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs toolchain
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs==1.6.1 mkdocs-material==9.5.50 mkdocs-mermaid2-plugin==1.2.1

      - name: Build leaderboard static page
        run: |
          python3 scripts/export_simulation_leaderboard_site.py \
            --reports-dir data/reports \
            --output-dir docs/leaderboard

      - name: Build docs site
        run: mkdocs build --site-dir site

      - name: Configure GitHub Pages
        id: configure_pages
        continue-on-error: true
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload pages artifact
        if: steps.configure_pages.outcome == 'success'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Upload docs artifact (fallback when Pages is not yet enabled)
        if: steps.configure_pages.outcome != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: docs-site-fallback
          path: site

  deploy:
    needs: build
    if: needs.build.outputs.pages_ready == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
