name: Release and Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build_dist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate public docs and metadata URLs
        run: |
          python3 tools/check_public_links.py \
            --pyproject pyproject.toml \
            --required docs/required_public_links.txt \
            --timeout 12

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
          twine check dist/*

      - name: Smoke test built wheel
        run: |
          python -m pip install --upgrade pip
          pip install dist/*.whl
          pqts --help > /tmp/pqts_help.txt
          test -s /tmp/pqts_help.txt

      - name: Validate semantic release metadata and checksums
        env:
          RELEASE_REF: ${{ github.ref_name }}
        run: |
          version="${RELEASE_REF#v}"
          python3 tools/prepare_release_artifacts.py \
            --dist-dir dist \
            --version "$version" \
            --git-sha "${GITHUB_SHA}" \
            --pyproject pyproject.toml \
            --changelog CHANGELOG.md \
            --checksums dist/SHA256SUMS.txt \
            --metadata dist/release_metadata.json

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  github_release:
    needs: build_dist
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  publish_pypi:
    needs: build_dist
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Keep only Python distributions for PyPI upload
        run: |
          find dist -maxdepth 1 -type f \
            ! -name "*.whl" \
            ! -name "*.tar.gz" \
            -print -delete
          ls -la dist

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
