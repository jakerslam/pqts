services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "main.py", "config/paper.yaml"]
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "src/dashboard/start.py"]
    env_file:
      - .env
    depends_on:
      app:
        condition: service_started
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pqts
      POSTGRES_USER: pqts
      POSTGRES_PASSWORD: pqts_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pqts_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pqts -d pqts"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    profiles: ["observability"]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - pqts_grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  pqts_postgres_data:
  pqts_grafana_data:
